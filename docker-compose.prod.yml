# Production docker-compose
# Uses the pre-built image from Docker Hub or GHCR.
# DO NOT put real secrets here — use Docker secrets or an env file
# that is NOT committed to version control.
#
# Usage:
#   DOCKER_IMAGE=ghcr.io/yourorg/pigw:latest docker-compose -f docker-compose.prod.yml up -d

version: "3.9"

services:
  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - pg_data_prod:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${POSTGRES_USER}" ]
      interval: 10s
      retries: 5

  web:
    image: ${DOCKER_IMAGE:-pigw:latest}
    command: >
      sh -c "python manage.py migrate --noinput &&
             gunicorn pigw.wsgi:application
             --bind 0.0.0.0:8000
             --workers 4
             --timeout 30
             --access-logfile -"
    ports:
      - "8000:8000"
    env_file:
      - .env.prod # DO NOT commit this file — contains real secrets
    environment:
      DJANGO_SETTINGS_MODULE: pigw.settings.prod
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

volumes:
  pg_data_prod:
