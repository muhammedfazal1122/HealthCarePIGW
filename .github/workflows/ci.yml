name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run tests
        working-directory: ./pigw
        env:
          DJANGO_SETTINGS_MODULE: pigw.settings.dev
        run: |
          pytest

name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  test:
    name: Run Tests
    runs-on: ubuntu-latest
    
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run Django Checks
        env:
          DJANGO_SETTINGS_MODULE: pigw.settings.dev
          FERNET_KEY: "dummy-key-for-checks-only================"
        run: |
          cd pigw
          python manage.py check

      - name: Run Pytest
        env:
          DJANGO_SETTINGS_MODULE: pigw.settings.dev
          # Generate a real Fernet key for tests so encryption round-trips work
        run: |
          cd pigw
          export FERNET_KEY=$(python -c "from cryptography.fernet import Fernet; print(Fernet.generate_key().decode())")
          pytest -v
